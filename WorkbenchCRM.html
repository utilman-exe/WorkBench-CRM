<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Workbench CRM</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.29.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg:#0e1016; --bg2:#161a24; --bg3:#1e2230; --bg4:#252a3a;
  --text:#e8eaf0; --text2:#8b91a8; --text3:#565d7a;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
  --accent:#E2231A; --accent-bg:rgba(226,35,26,0.12);
  --success:#22c55e; --success-bg:rgba(34,197,94,0.12);
  --danger:#ef4444;  --danger-bg:rgba(239,68,68,0.12);
  --warn:#f59e0b;    --warn-bg:rgba(245,158,11,0.10);
  --info:#3b82f6;    --info-bg:rgba(59,130,246,0.12);
  --r:5px; --rl:8px;
  --font:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
[data-theme="light"] {
  --bg:#f5f6fa; --bg2:#ffffff; --bg3:#eef0f6; --bg4:#dde0ec;
  --text:#111827; --text2:#6b7280; --text3:#9ca3af;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.16);
  --accent-bg:rgba(226,35,26,0.10);
  --success-bg:rgba(34,197,94,0.10);
  --danger-bg:rgba(239,68,68,0.10);
  --warn-bg:rgba(245,158,11,0.10);
  --info-bg:rgba(59,130,246,0.10);
}
[data-theme="oled"] {
  --bg:#000000; --bg2:#0a0a0a; --bg3:#111111; --bg4:#1c1c1c;
  --text:#f0f0f0; --text2:#888888; --text3:#444444;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.12);
  --accent-bg:rgba(226,35,26,0.14);
  --success-bg:rgba(34,197,94,0.12); --danger-bg:rgba(239,68,68,0.12);
  --warn-bg:rgba(245,158,11,0.10); --info-bg:rgba(59,130,246,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.7;min-height:100vh}
/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;background:var(--bg2);border-bottom:1px solid var(--border);border-top:3px solid var(--accent);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.logo{font-family:var(--mono);font-size:16px;display:flex;align-items:center;gap:10px;letter-spacing:-0.01em;user-select:none}.logo-work{color:var(--text);font-weight:400}.logo-bench{color:var(--accent);font-weight:700;position:relative}.logo-bench::after{content:'';position:absolute;width:5px;height:5px;border-radius:50%;background:var(--accent);top:-3px;right:2px;box-shadow:0 0 6px rgba(226,35,26,.7)}.logo-rest{color:var(--text2);font-weight:400}
.logo small{color:var(--text3);font-size:13px;font-weight:400;letter-spacing:0}
.hdr-right{display:flex;align-items:center;gap:8px}
/* Tabs */
.tabs{display:flex;gap:0;padding:0 24px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:6px;padding:12px 16px;font-size:13px;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:var(--font);margin-bottom:-1px;transition:color .12s,background .12s;letter-spacing:.01em}
.tab:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.tab.on{color:var(--text);font-weight:600;border-bottom-color:var(--accent);background:rgba(226,35,26,0.05)}
.tab .ct{font-size:13px;background:var(--bg3);padding:1px 6px;border-radius:99px}
.tab.on .ct{background:var(--accent-bg);color:var(--accent)}
/* Content */
.page{max-width:1200px;margin:0 auto;padding:20px}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--border2);border-radius:var(--r);padding:14px 16px;display:flex;flex-direction:column-reverse;gap:4px;transition:border-left-color .2s,box-shadow .15s}.sc:hover{box-shadow:0 2px 12px rgba(0,0,0,.25)}
.sc-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.sc-val{font-family:var(--mono);font-size:26px;font-weight:500;line-height:1}
/* Toolbar */
.tb{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.tb h2{font-size:15px;font-weight:500}
.tb-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
/* Search */
.srch{position:relative}
.srch i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.srch input{padding:6px 12px 6px 32px;font-size:14px;border-radius:99px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:var(--font);width:240px;outline:none;transition:border-color .15s,width .2s}
.srch input:focus{border-color:var(--accent);width:280px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:13px;font-weight:500;border-radius:var(--r);cursor:pointer;border:none;font-family:var(--font);transition:opacity .12s,transform .08s;white-space:nowrap;letter-spacing:.01em}
.btn:hover{opacity:.88}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--accent);color:#fff}
.btn-g{background:transparent;color:var(--text);border:1px solid var(--border2)}
.btn-g:hover{background:var(--bg3);opacity:1}
.btn-sm{padding:5px 10px;font-size:13px}
.bic{background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:var(--r);cursor:pointer;font-size:14px;display:inline-flex;align-items:center;padding:5px 8px;transition:all .12s}
.bic:hover{background:var(--bg3);color:var(--text)}
.bic.d:hover{color:var(--danger);border-color:rgba(239,68,68,.4);background:var(--danger-bg)}
/* Table */
.tw{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl);box-shadow:0 2px 16px rgba(0,0,0,.25)}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:nth-child(even){background:rgba(255,255,255,0.018)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:10px 14px;vertical-align:middle}
.td-m{font-weight:500}
.td-s{font-size:13px;color:var(--text2);margin-top:2px;font-family:var(--mono)}
.td-a{display:flex;gap:5px}
/* Badges */
.bdg{display:inline-flex;align-items:center;font-size:13px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap;letter-spacing:.02em}
.b-pending{background:rgba(245,158,11,.15);color:#fbbf24}
.b-progress{background:rgba(59,130,246,.15);color:#60a5fa}
.b-waiting{background:rgba(168,85,247,.15);color:#c084fc}
.b-done{background:rgba(34,197,94,.15);color:#4ade80}
.b-cancelled{background:rgba(107,114,128,.15);color:#9ca3af}
.b-listed{background:rgba(59,130,246,.15);color:#60a5fa}
.b-reserved{background:rgba(245,158,11,.15);color:#fbbf24}
.b-sold{background:rgba(34,197,94,.15);color:#4ade80}
.b-shipped{background:rgba(168,85,247,.15);color:#c084fc}
.b-incoming{background:rgba(59,130,246,.15);color:#60a5fa}
.b-sentback{background:rgba(251,191,36,.15);color:#fbbf24}
.b-low{background:rgba(107,114,128,.15);color:#9ca3af}
.b-normal{background:rgba(59,130,246,.15);color:#60a5fa}
.b-high{background:rgba(245,158,11,.15);color:#fbbf24}
.b-urgent{background:rgba(239,68,68,.15);color:#f87171}
.b-draft{background:rgba(107,114,128,.15);color:#9ca3af}
.b-sent{background:rgba(59,130,246,.15);color:#60a5fa}
.b-paid{background:rgba(34,197,94,.15);color:#4ade80}
/* Sale cards */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.sc2{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:box-shadow .15s;border-top-width:3px}
.sc2:hover{box-shadow:0 4px 20px rgba(0,0,0,.35)}
.sc2-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sc2-t{font-weight:500;font-size:15px}
.sc2-s{font-size:13px;color:var(--text2);margin-top:2px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{font-size:13px;padding:2px 7px;border-radius:var(--r);background:var(--bg3);color:var(--text2);font-family:var(--mono)}
.chip strong{color:var(--text);font-weight:500}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.pb{text-align:center;padding:7px 4px;background:var(--bg3);border-radius:var(--r)}
.pb-l{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase}
.pb-v{font-family:var(--mono);font-size:15px;font-weight:500;margin-top:2px}
.pbar{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:var(--r);margin-bottom:10px}
.pp{background:var(--success-bg)} .pn{background:var(--danger-bg)}
.pp .pl{color:var(--success)} .pn .pl{color:var(--danger)}
.pl{font-size:13px;font-weight:500}
.pv{font-family:var(--mono);font-size:15px;font-weight:500}
.pp .pv{color:var(--success)} .pn .pv{color:var(--danger)}
.upl{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.6}
.sc2-a{display:flex;gap:6px}
/* Customer cards */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.cc-h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.av{width:38px;height:38px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px;color:var(--accent);flex-shrink:0;font-family:var(--mono)}
.cn{font-weight:500}
.cs{font-size:13px;color:var(--text2);font-family:var(--mono)}
.cst{display:flex;gap:12px;font-size:13px;color:var(--text2)}
.cst strong{color:var(--text);font-weight:500}
.cc-a{display:flex;gap:6px;margin-top:10px}
/* Notes */
.ng{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.nc{border-radius:var(--rl);padding:14px}
.nc.y{background:rgba(245,158,11,.10);border:1px solid rgba(245,158,11,.20)}
.nc.b{background:rgba(59,130,246,.10);border:1px solid rgba(59,130,246,.20)}
.nc.g{background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.20)}
.nc.p{background:rgba(236,72,153,.10);border:1px solid rgba(236,72,153,.20)}
.nc textarea{background:transparent;border:none;outline:none;width:100%;font-family:var(--font);font-size:14px;color:var(--text);resize:vertical;min-height:180px}
.nc-f{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.nd{font-size:12px;color:var(--text3);font-family:var(--mono)}
.nc.done{opacity:.5}
.nc.done textarea{text-decoration:line-through}
/* Modal */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:var(--bg2);border:1px solid var(--border2);border-top:3px solid var(--accent);border-radius:var(--rl);width:100%;max-width:720px;padding:22px;margin:auto;box-shadow:0 16px 60px rgba(0,0,0,.6)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mt{font-size:15px;font-weight:500}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
/* Forms */
.fg{display:grid;gap:12px}
.fg2{grid-template-columns:1fr 1fr}
.fc{grid-column:1/-1}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.fi{width:100%;padding:9px 12px;font-size:14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--accent)}
textarea.fi{resize:vertical;min-height:68px}
select.fi{cursor:pointer}
.fs{background:var(--bg3);border-radius:var(--r);padding:14px;margin-bottom:4px}
.fsl{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px;border-left:3px solid var(--accent);padding-left:8px}
.fchk{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px}
.fchk input{cursor:pointer;width:15px;height:15px}
/* Detail rows */
.dr{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.dr:last-child{border-bottom:none}
.dl{font-size:15px;color:var(--text2);min-width:150px;flex-shrink:0;font-weight:500}
.dv{font-size:15px;font-family:var(--mono)}
/* Price preview */
.pp4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--bg3);border-radius:var(--r);padding:12px;margin:10px 0}
.pp4b{text-align:center}
.pp4l{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase}
.pp4v{font-family:var(--mono);font-size:16px;font-weight:500;margin-top:3px}
/* Invoice items */
.inv-items{width:100%;border-collapse:collapse;margin:8px 0}
.inv-items th{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-align:left;padding:6px 8px;border-bottom:1px solid var(--border2)}
.inv-items td{padding:5px 6px;border-bottom:1px solid var(--border);font-size:14px}
.ii{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:4px 7px;font-size:13px;color:var(--text);font-family:var(--font);width:100%;outline:none}
.ii:focus{border-color:var(--accent)}
.inv-tot{text-align:right;padding:8px;font-family:var(--mono);font-size:15px;font-weight:500;border-top:2px solid var(--border2)}
.warn-tab{color:var(--danger)!important}
.warn-tab .ct{background:var(--danger-bg)!important;color:var(--danger)!important}
.days-pill{font-size:12px;padding:2px 7px;border-radius:99px;font-weight:600}
.days-ok{background:rgba(34,197,94,.15);color:#4ade80}
.days-warn{background:rgba(245,158,11,.15);color:#fbbf24}
.days-crit{background:rgba(239,68,68,.15);color:#f87171}
.plat-icon{font-size:14px;margin-left:5px;vertical-align:-1px}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;z-index:200}
.fab-btn{width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(226,35,26,.45);transition:transform .15s,box-shadow .15s}
.fab-btn:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(226,35,26,.55)}
.fab-menu{display:none;position:absolute;bottom:62px;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:6px;min-width:190px;flex-direction:column;gap:3px;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.fab-menu.open{display:flex}
.fab-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--r);cursor:pointer;border:none;background:none;color:var(--text);font-size:14px;font-family:var(--font);width:100%;text-align:left;transition:background .1s}
.fab-item:hover{background:var(--bg3)}
/* Timeline */
.tl{display:flex;flex-direction:column;gap:0;margin-left:8px}
.tl-row{display:flex;gap:10px;padding:7px 0 7px 14px;border-left:2px solid var(--border2);position:relative}
.tl-row::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent);position:absolute;left:-5px;top:9px}
.tl-ts{font-size:12px;color:var(--text3);font-family:var(--mono);white-space:nowrap;min-width:90px}
.tl-txt{font-size:13px;color:var(--text2)}
/* Photos */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:10px}
.ph-wrap{position:relative;aspect-ratio:1;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);cursor:pointer}
.ph-wrap img{width:100%;height:100%;object-fit:cover}
.ph-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);border:none;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:13px;line-height:1}
.ph-add{aspect-ratio:1;border:2px dashed var(--border2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text3);transition:border-color .15s,color .15s}
.ph-add:hover{border-color:var(--accent);color:var(--accent)}
/* Bulk bar */
.bulk-bar{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--accent-bg);border:1px solid rgba(226,35,26,.25);border-radius:var(--r);margin-bottom:12px}
.bulk-bar span{font-size:14px;font-weight:500;color:var(--accent);flex:1}
/* Activity */
.act-list{display:flex;flex-direction:column;gap:0}
.act-row{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.act-row:last-child{border-bottom:none}
.act-ic{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.act-body{flex:1;min-width:0}
.act-text{font-size:13px;line-height:1.4}
.act-ts{font-size:12px;color:var(--text3);font-family:var(--mono)}
/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.dash-grid{grid-template-columns:1fr}}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.dash-card h3{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
/* Reports bars */
.rbar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:13px}
.rbar-lbl{min-width:48px;color:var(--text2);text-align:right;font-family:var(--mono)}
.rbar-track{flex:1;background:var(--bg3);border-radius:99px;height:12px;overflow:hidden}
.rbar-fill{height:100%;border-radius:99px;background:var(--accent)}
.rbar-val{min-width:28px;font-family:var(--mono);font-size:13px;color:var(--text2)}
/* Global search overlay */
.gso{position:fixed;top:52px;left:0;right:0;z-index:400;background:var(--bg2);border-bottom:1px solid var(--border2);padding:14px 20px;max-height:65vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.35);display:none}
.gso.open{display:block}
.gso-group{margin-bottom:14px}
.gso-label{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.gso-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:var(--r);cursor:pointer;transition:background .1s}
.gso-item:hover{background:var(--bg3)}
.gso-title{font-size:14px;font-weight:500}
.gso-sub{font-size:13px;color:var(--text2)}
/* Lightbox */
#lightbox{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;cursor:pointer}
#lightbox.open{display:flex}
#lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:var(--r)}
/* Parts used */
.part-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px 4px 8px;font-size:14px;background:var(--info-bg);border:1px solid rgba(59,130,246,.2);border-radius:99px;font-size:13px;color:var(--info)}
.part-tag button{background:none;border:none;cursor:pointer;color:inherit;opacity:.7;padding:0;line-height:1;font-size:13px}
.part-tag button:hover{opacity:1}
kbd{display:inline-block;padding:1px 6px;font-size:12px;font-family:var(--mono);background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text2)}

/* Filter buttons */
.fbtn{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;font-size:13px;font-weight:500;border-radius:99px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--font);transition:all .12s;white-space:nowrap}
.fbtn:hover{background:var(--bg3);color:var(--text)}
.fbtn .n{font-size:12px;background:rgba(128,128,128,.2);padding:1px 5px;border-radius:99px}
.fbtn.f-all.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.fbtn.f-pending.on{background:rgba(245,158,11,.18);color:#fbbf24;border-color:rgba(245,158,11,.3)}
.fbtn.f-progress.on{background:rgba(59,130,246,.18);color:#60a5fa;border-color:rgba(59,130,246,.3)}
.fbtn.f-waiting.on{background:rgba(168,85,247,.18);color:#c084fc;border-color:rgba(168,85,247,.3)}
.fbtn.f-done.on{background:rgba(34,197,94,.18);color:#4ade80;border-color:rgba(34,197,94,.3)}
.fbtn.f-cancelled.on{background:rgba(107,114,128,.18);color:#9ca3af;border-color:rgba(107,114,128,.3)}
.fbtn.f-listed.on{background:rgba(59,130,246,.18);color:#60a5fa;border-color:rgba(59,130,246,.3)}
.fbtn.f-notlisted.on{background:rgba(107,114,128,.18);color:#9ca3af;border-color:rgba(107,114,128,.3)}
.fbtn.f-reserved.on{background:rgba(245,158,11,.18);color:#fbbf24;border-color:rgba(245,158,11,.3)}
.fbtn.f-sold.on{background:rgba(34,197,94,.18);color:#4ade80;border-color:rgba(34,197,94,.3)}
/* Status select at end of row */
.stat-sel{font-size:13px;padding:3px 8px;border-radius:99px;border:1px solid var(--border2);cursor:pointer;font-weight:600;background:var(--bg3);color:var(--text);outline:none;font-family:var(--font);letter-spacing:.01em}
.stat-sel:hover{border-color:var(--accent)}
/* low stock indicator is now manual — dot in row */
/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.empty i{font-size:34px;display:block;margin-bottom:10px;opacity:.25}
.empty p{font-size:14px}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
/* Utility */
.mono{font-family:var(--mono)}
.t2{color:var(--text2)} .t3{color:var(--text3)}
.ok{color:var(--success)} .bad{color:var(--danger)} .warn{color:var(--warn)} .acc{color:var(--accent)}

/* ═══════════════ PRINT ═══════════════ */
#print-area{display:none}
@media print{
  body>*{display:none!important}
  #print-area{display:block!important}
  .ticket{font-family:'IBM Plex Mono',monospace;font-size:13px;max-width:80mm;margin:0 auto;padding:8px}
  .ticket h1{font-size:15px;font-weight:bold;text-align:center;margin-bottom:2px}
  .ticket .sub{font-size:11px;text-align:center;margin-bottom:10px;border-bottom:1px dashed #000;padding-bottom:8px}
  .ticket .row{display:flex;justify-content:space-between;margin:3px 0;gap:8px}

  .inv-print .inv-num{font-size:14px;color:#555}
  .inv-print .inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
  .inv-print .party-label{font-size:11px;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:#888;margin-bottom:4px}
  .inv-print .party-name{font-size:14px;font-weight:bold}
  .inv-print table{width:100%;border-collapse:collapse;margin:12px 0}
  .inv-print thead th{text-align:left;border-bottom:2px solid #000;padding:6px 8px;font-size:12px;font-weight:bold;letter-spacing:.05em;text-transform:uppercase}
  .inv-print tbody td{padding:6px 8px;border-bottom:1px solid #ddd;font-size:13px}
  .inv-print .total-row{font-weight:bold;font-size:14px;border-bottom:2px solid #000}
  .inv-print .inv-footer{margin-top:20px;font-size:13px;color:#555}
  @page{margin:12mm}
  .hdr,.tabs,.fab,.gso,#lightbox{display:none!important}
  .page{padding:0!important;max-width:100%!important}
  .tw{overflow:visible!important;border:none!important}
  table{font-size:13px!important}
  .bic,.btn{display:none!important}
  .bdg{border:1px solid #ccc!important;background:transparent!important;color:#000!important}
}

.tab{font-size:14px!important}

<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const DT=['Laptop','Desktop','Phone','Tablet','Printer','Monitor','Server','Other'];
const RS=['Pending','In Progress','Waiting Parts','Done','Sent Back','Cancelled'];
const SS=['Listed','Not Listed','Incoming','Reserved','Shipped','Sent Back','Sold'];
const PR=['Low','Normal','High','Urgent'];
const IC=['Laptop','Desktop PC','Tablet','Smartphone','Monitor','Printer','Peripheral','Network','RAM','SSD/HDD','Battery','Screen','CPU','GPU','Motherboard','PSU','Cooling','Keyboard','Mouse','Charger','Cable','Adapter','Docking Station','Software','Other'];
const NAME_CAT_MAP=[
  [/\b(nvme|m\.?2|pcie|ssd)\b/i,'SSD/HDD'],[/\b(hdd|hard.?disk|sata.?2\.5|sata.?3\.5)\b/i,'SSD/HDD'],
  [/\b(ram|ddr[345]?|dimm|sodimm|rimm)\b/i,'RAM'],
  [/\b(cpu|processor|intel|amd|ryzen|core\s*i[3579]|i[3579][- ]|xeon|pentium|celeron|athlon|threadripper|core\s*ultra|snapdragon)\b/i,'CPU'],
  [/\b(gpu|graphics|rtx|gtx|radeon|vega|rx\s?\d|quadro)\b/i,'GPU'],
  [/\b(battery|akku|batter)\b/i,'Battery'],
  [/\b(lcd|screen|display|panel|ips|oled|amoled)\b/i,'Screen'],
  [/\b(motherboard|mainboard|mobo)\b/i,'Motherboard'],
  [/\b(psu|power.?supply|watt)\b/i,'PSU'],
  [/\b(fan|cooler|heatsink|aio|cooling)\b/i,'Cooling'],
  [/\b(keyboard|kbd)\b/i,'Keyboard'],
  [/\b(mouse|trackpad|touchpad)\b/i,'Mouse'],
  [/\b(laptop|notebook|macbook|thinkpad|ideapad|inspiron|latitude|elitebook|probook|zenbook|vivobook|xps|surface)\b/i,'Laptop'],
  [/\b(desktop|pc\b|imac|mini.?pc|nuc|tower|workstation|all.?in.?one)\b/i,'Desktop PC'],
  [/\b(tablet|ipad|surface.?pro|android.?tab)\b/i,'Tablet'],
  [/\b(phone|smartphone|iphone|samsung.?galaxy|pixel|xiaomi|huawei|oneplus)\b/i,'Smartphone'],
  [/\b(monitor|lcd.?screen|display.?\d|\d+.?inch.?screen)\b/i,'Monitor'],
  [/\b(printer|laser.?jet|ink.?jet|multifunction|mfp)\b/i,'Printer'],
  [/\b(mouse|mice|trackball)\b/i,'Mouse'],
  [/\b(peripheral|webcam|headset|headphone|microphone|speaker|gamepad|controller|joystick)\b/i,'Peripheral'],
  [/\b(router|switch|access.?point|ethernet|network|wifi|modem|firewall)\b/i,'Network'],
  [/\b(dock|docking.?station|thunderbolt.?dock|usb.?hub)\b/i,'Docking Station'],
  [/\b(cable|wire)\b/i,'Cable'],
  [/\b(charger|magsafe|gan.?charger)\b/i,'Charger'],
  [/\b(adapter|dongle)\b/i,'Adapter'],
];
function categorySuggest(name){
  for(const [re,cat] of NAME_CAT_MAP){if(re.test(name))return cat;}
  return null;
}
function onInvName(v){
  const sug=categorySuggest(v);
  const el=document.getElementById('f-cat');
  if(sug&&el&&!el.dataset.userSet){el.value=sug;refreshCatFields();}
}
function onInvNotes(v){
  // Only suggest if no category has been manually chosen and name didn't already set one
  const el=document.getElementById('f-cat');
  if(!el||el.dataset.userSet)return;
  const sug=categorySuggest(v);
  if(!sug)return;
  el.value=sug;
  refreshCatFields();
  // Show a subtle hint that the category was auto-detected
  let hint=document.getElementById('cat-suggest-hint');
  if(!hint){hint=document.createElement('div');hint.id='cat-suggest-hint';
    hint.style.cssText='font-size:11px;color:var(--text3);margin-top:4px';
    el.parentNode.appendChild(hint);}
  hint.textContent='Category auto-detected from notes: '+sug;
  setTimeout(()=>{if(hint)hint.textContent='';},3000);
}
function onDriveTypeChange(v){
  const wrap=document.getElementById('m2-size-wrap');
  if(!wrap)return;
  const isM2=v.toLowerCase().includes('m.2')||v.toLowerCase().includes('nvme');
  wrap.style.display=isM2?'':'none';
  if(!isM2){const s=document.getElementById('f-m2size');if(s)s.value='';}
}
function onCatChange(){
  const el=document.getElementById('f-cat');
  if(el)el.dataset.userSet='1';
  refreshCatFields();
}

// Category-specific field specs
const CAT_SPEC={
  'SSD/HDD':{
    form:d=>{
      const isM2=(d.driveType||'').toLowerCase().includes('m.2')||(d.driveType||'').toLowerCase().includes('nvme');
      return`
      <div><label>Drive Size</label><input class="fi" id="f-driveSize" placeholder="512GB · 1TB · 2TB…" value="${esc(d.driveSize||'')}"></div>
      <div><label>Interface / Type</label><select class="fi" id="f-driveType" onchange="onDriveTypeChange(this.value)">
        <option value="">—</option>
        ${['NVMe M.2','SATA M.2','SATA 2.5"','SATA 3.5"','mSATA','PCIe Add-in Card'].map(o=>`<option ${(d.driveType||'')=== o?'selected':''}>${o}</option>`).join('')}
      </select></div>
      <div id="m2-size-wrap" style="${isM2?'':'display:none'}">
        <label>M.2 Physical Size</label>
        <select class="fi" id="f-m2size">
          <option value="">— Select size —</option>
          ${['2230 (short, Surface/NUC)','2242 (short)','2260 (medium)','2280 (standard, most laptops)','22110 (server/enterprise)'].map(o=>`<option ${(d.m2size||'')=== o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div><label>Health % <span style="font-size:12px;font-weight:400;margin-left:6px"><label style="cursor:pointer"><input type="checkbox" id="f-driveHC" ${d.driveHealthConfirmed?'checked':''} style="margin-right:3px">confirmed</label></span></label>
        <input class="fi" id="f-driveHealth" type="number" min="0" max="100" placeholder="0–100" value="${esc(String(d.driveHealth||''))}"></div>`;
    },
    save:()=>({driveSize:gv('f-driveSize'),driveType:gv('f-driveType'),m2size:gv('f-m2size'),driveHealth:gv('f-driveHealth'),driveHealthConfirmed:gv('f-driveHC')}),
    display:i=>{
      const parts=[i.driveSize,i.driveType];
      if(i.m2size)parts.push(i.m2size.split(' ')[0]);
      parts.push(healthBadge(i.driveHealth,i.driveHealthConfirmed));
      return parts.filter(Boolean).join(' ');
    },
    groupKey:i=>(i.name||'').toLowerCase().trim(),
  },
  'CPU':{
    form:d=>`
      <div><label>Cores</label><input class="fi" id="f-cpuCores" type="number" min="1" placeholder="8" value="${esc(String(d.cpuCores||''))}"></div>
      <div><label>Threads</label><input class="fi" id="f-cpuThreads" type="number" min="1" placeholder="16" value="${esc(String(d.cpuThreads||''))}"></div>
      <div><label>Base Clock (GHz)</label><input class="fi" id="f-cpuBase" placeholder="2.4" value="${esc(d.cpuBase||'')}"></div>
      <div><label>Boost Clock (GHz)</label><input class="fi" id="f-cpuBoost" placeholder="4.8" value="${esc(d.cpuBoost||'')}"></div>
      <div><label>Socket</label><input class="fi" id="f-cpuSocket" placeholder="LGA1700 · AM5…" value="${esc(d.cpuSocket||'')}"></div>
      <div><label>Generation / Series</label><input class="fi" id="f-cpuGen" placeholder="12th Gen · Zen 4…" value="${esc(d.cpuGen||'')}"></div>`,
    save:()=>({cpuCores:gv('f-cpuCores'),cpuThreads:gv('f-cpuThreads'),cpuBase:gv('f-cpuBase'),cpuBoost:gv('f-cpuBoost'),cpuSocket:gv('f-cpuSocket'),cpuGen:gv('f-cpuGen')}),
    display:i=>[i.cpuCores&&i.cpuCores+'C/'+( i.cpuThreads||'?')+'T',i.cpuBase&&i.cpuBase+'GHz',i.cpuSocket,i.cpuGen].filter(Boolean).join(' · '),
  },
  'RAM':{
    form:d=>`
      <div><label>Capacity per Stick (GB)</label><input class="fi" id="f-ramSize" type="number" placeholder="16" value="${esc(String(d.ramSize||''))}"></div>
      <div><label>Type</label><select class="fi" id="f-ramType">
        <option value="">—</option>
        ${['DDR3','DDR3L','DDR4','DDR4L','DDR5','LPDDR4','LPDDR4X','LPDDR5'].map(o=>`<option ${(d.ramType||'')=== o?'selected':''}>${o}</option>`).join('')}
      </select></div>
      <div><label>Speed (MHz)</label><input class="fi" id="f-ramSpeed" placeholder="3200 · 4800…" value="${esc(d.ramSpeed||'')}"></div>
      <div><label>Manufacturer</label><select class="fi" id="f-ramMaker">
        <option value="">—</option>
        ${['Samsung','SK Hynix','Micron','Kingston','Corsair','G.Skill','Crucial','Team','Adata','Other'].map(o=>`<option ${(d.ramMaker||'')=== o?'selected':''}>${o}</option>`).join('')}
      </select></div>
      <div><label>Form Factor</label><select class="fi" id="f-ramForm">
        <option value="">—</option>
        ${['SO-DIMM (Laptop)','DIMM (Desktop)','LPDDR (Soldered)'].map(o=>`<option ${(d.ramForm||'')=== o?'selected':''}>${o}</option>`).join('')}
      </select></div>`,
    save:()=>({ramSize:gv('f-ramSize'),ramType:gv('f-ramType'),ramSpeed:gv('f-ramSpeed'),ramMaker:gv('f-ramMaker'),ramForm:gv('f-ramForm')}),
    display:i=>[i.ramForm?'['+i.ramForm.split(' ')[0]+']':'',i.ramSize&&i.ramSize+'GB',i.ramType,i.ramSpeed&&i.ramSpeed+'MHz',i.ramMaker].filter(Boolean).join(' '),
  },
  'GPU':{
    form:d=>`
      <div><label>VRAM (GB)</label><input class="fi" id="f-gpuVram" type="number" placeholder="8" value="${esc(String(d.gpuVram||''))}"></div>
      <div><label>Memory Type</label><select class="fi" id="f-gpuMemType">
        <option value="">—</option>
        ${['GDDR5','GDDR6','GDDR6X','HBM2','HBM2e','GDDR7'].map(o=>`<option ${(d.gpuMemType||'')=== o?'selected':''}>${o}</option>`).join('')}
      </select></div>
      <div><label>Interface</label><input class="fi" id="f-gpuInterface" placeholder="PCIe 4.0 x16" value="${esc(d.gpuInterface||'')}"></div>`,
    save:()=>({gpuVram:gv('f-gpuVram'),gpuMemType:gv('f-gpuMemType'),gpuInterface:gv('f-gpuInterface')}),
    display:i=>[i.gpuVram&&i.gpuVram+'GB',i.gpuMemType,i.gpuInterface].filter(Boolean).join(' · '),
  },
  'Motherboard':{
    form:d=>`
      <div><label>Socket</label><input class="fi" id="f-mbSocket" placeholder="LGA1700 · AM5 · AM4…" value="${esc(d.mbSocket||'')}"></div>
      <div><label>Chipset</label><input class="fi" id="f-mbChipset" placeholder="Z790 · B650 · H610…" value="${esc(d.mbChipset||'')}"></div>
      <div><label>Form Factor</label><select class="fi" id="f-mbForm">
        <option value="">—</option>
        ${['ATX','mATX','Mini-ITX','E-ATX','Thin Mini-ITX'].map(o=>`<option ${(d.mbForm||'')=== o?'selected':''}>${o}</option>`).join('')}
      </select></div>`,
    save:()=>({mbSocket:gv('f-mbSocket'),mbChipset:gv('f-mbChipset'),mbForm:gv('f-mbForm')}),
    display:i=>[i.mbSocket,i.mbChipset,i.mbForm].filter(Boolean).join(' · '),
  },
  'PSU':{
    form:d=>`
      <div><label>Wattage</label><input class="fi" id="f-psuW" type="number" placeholder="650" value="${esc(String(d.psuW||''))}"></div>
      <div><label>Efficiency Rating</label><select class="fi" id="f-psuEff">
        <option value="">—</option>
        ${['80+ White','80+ Bronze','80+ Silver','80+ Gold','80+ Platinum','80+ Titanium'].map(o=>`<option ${(d.psuEff||'')=== o?'selected':''}>${o}</option>`).join('')}
      </select></div>
      <div><label>Modular</label><select class="fi" id="f-psuMod">
        <option value="">—</option>
        ${['Non-Modular','Semi-Modular','Fully Modular'].map(o=>`<option ${(d.psuMod||'')=== o?'selected':''}>${o}</option>`).join('')}
      </select></div>`,
    save:()=>({psuW:gv('f-psuW'),psuEff:gv('f-psuEff'),psuMod:gv('f-psuMod')}),
    display:i=>[i.psuW&&i.psuW+'W',i.psuEff,i.psuMod].filter(Boolean).join(' · '),
  },
  'Screen':{
    form:d=>`
      <div><label>Size (inches)</label><input class="fi" id="f-scSize" placeholder="15.6 · 14…" value="${esc(d.scSize||'')}"></div>
      <div><label>Resolution</label><input class="fi" id="f-scRes" placeholder="1920×1080 · 2560×1440…" value="${esc(d.scRes||'')}"></div>

function load(){
  try{
    // Migrate from old key if needed
    if(!localStorage.getItem('wb_data')&&localStorage.getItem('npng')){
      localStorage.setItem('wb_data',localStorage.getItem('npng'));
    }
    const d=localStorage.getItem('wb_data');
    if(d)Object.assign(S,JSON.parse(d));
  }catch(e){}
}
function save(){
  try{
    const data=JSON.stringify(S);
    localStorage.setItem('wb_data',data);
    // Warn if approaching quota
    const kb=Math.round(data.length/1024);
    if(kb>4500&&!window._storageWarnShown){
      window._storageWarnShown=true;
      console.warn('Storage: '+kb+'KB');
      const el=document.getElementById('storage-warn');
      if(el){el.style.display='inline-flex';el.title=kb+'KB used — approaching browser limit. Export a backup!';
        el.textContent='⚠ '+Math.round(kb/5120*100)+'% storage';}
    } else if(kb<4000&&window._storageWarnShown){
      window._storageWarnShown=false;
      const el=document.getElementById('storage-warn');if(el)el.style.display='none';
    }
  }catch(e){
    if(e.name==='QuotaExceededError'||e.code===22){
      alert('⚠ Storage full! Your browser\'s localStorage is at capacity.\n\nExport a backup immediately, then delete photos or old items to free space.');
    }
  }
}

const fmt=n=>{const v=Number(n);const r=isFinite(v)?Math.round(v):0;
  const s=r.toLocaleString(CURRENCY.locale);
  return CURRENCY.pos==='before'?CURRENCY.symbol+s:s+' '+CURRENCY.symbol;
};
const fmts=n=>{const v=Number(n);const r=isFinite(v)?Math.round(v):0;
  if(r===0)return '0 '+CURRENCY.symbol;
  const s=Math.abs(r).toLocaleString(CURRENCY.locale);
  const num=CURRENCY.pos==='before'?CURRENCY.symbol+s:s+' '+CURRENCY.symbol;
  return(r<0?'−':'+')+num;
};

    {id:'repairs',icon:'ti-tool',label:'Repairs',n:S.repairs.length,

function switchTab(tab){S.tab=tab;S.search='';document.getElementById('gsearch').value='';renderTabs();renderPage()}

function statsHTML(){
  const active=S.repairs.filter(r=>!['Done','Cancelled'].includes(r.status)).length;
  const listed=S.forSale.filter(s=>s.status==='Listed').length;
  const sv=S.inventory.reduce((s,i)=>s+Number(i.qty||0)*Number(i.purchasePrice||0),0);
  const fsv=S.forSale.filter(x=>x.status!=='Sold').reduce((s,x)=>s+Number(x.sellingPrice||0),0);
  const pp=S.forSale.filter(s=>s.status==='Listed').reduce((s,i)=>s+profit(i),0);
  const pi=S.invoices.filter(i=>i.status==='Paid').reduce((s,i)=>s+invTot(i),0);
  return`<div class="stats">
    <div class="sc"><div class="sc-label"><i class="ti ti-tool"></i>Active Repairs</div><div class="sc-val acc">${active}</div></div>
    <div class="sc"><div class="sc-label"><i class="ti ti-tag"></i>For Sale</div><div class="sc-val ok">${listed}</div></div>
    <div class="sc" style="cursor:pointer" onclick="switchTab('inventory')"><div class="sc-label"><i class="ti ti-package"></i>Inv. Value</div><div class="sc-val">${fmts(sv)}</div></div>
    <div class="sc" style="cursor:pointer" onclick="switchTab('forsale')"><div class="sc-label"><i class="ti ti-tag"></i>Sale Value</div><div class="sc-val ok">${fmts(fsv)}</div></div>
    <div class="sc" style="border-left-color:${pp>0?'var(--success)':pp<0?'var(--danger)':'var(--border2)'}"><div class="sc-label"><i class="ti ti-trending-up"></i>Pot. Profit</div><div class="sc-val" style="color:${pp>0?'var(--success)':pp<0?'var(--danger)':'var(--text2)'}">${fmts(pp)}</div></div>
    <div class="sc"><div class="sc-label"><i class="ti ti-receipt"></i>Paid Invoices</div><div class="sc-val ok">${fmts(pi)}</div></div>
  </div>`;
}

function renderPage(){
  const q=S.search.toLowerCase();
  if(S.tab==='dashboard')return void(document.getElementById('page').innerHTML=dashboardHTML());
  if(S.tab==='reports')return void(document.getElementById('page').innerHTML=reportsHTML());
  let html=statsHTML();
  if(S.tab==='repairs')   html+=repairsHTML(q);
  if(S.tab==='forsale')   html+=forsaleHTML(q);
  if(S.tab==='inventory') html+=inventoryHTML(q);
  if(S.tab==='customers') html+=customersHTML(q);
  if(S.tab==='invoices')  html+=invoicesHTML(q);
  if(S.tab==='notes')     html+=notesHTML();
  if(S.tab==='trash')     html+=trashHTML(q);
  document.getElementById('page').innerHTML=html;
  // reattach bulk checkboxes state
  document.querySelectorAll('.repair-chk').forEach(cb=>{cb.checked=selectedRepairs.has(cb.dataset.id);});
}

function render(){renderTabs();renderPage()}

function invCellVal(item,key){

  if(key==='qty')return`<span class="mono"${item.isLowStock?' style="color:var(--danger)"':''}>${v||0}</span>`;
  if(key==='driveHealth')return healthBadge(v,item.driveHealthConfirmed);
  return esc(String(v||'—'));

function invSortedList(list){
  const{col,dir}=invSort;
  const sorted=[...list].sort((a,b)=>{
    let av=a[col]??'', bv=b[col]??'';
    if(NUMERIC_INV.has(col)){av=Number(av)||0;bv=Number(bv)||0;}
    else if(typeof av==='string')av=av.toLowerCase();
    if(typeof bv==='string')bv=bv.toLowerCase();
    if(av<bv)return dir==='asc'?-1:1;
    if(av>bv)return dir==='asc'?1:-1;
    return 0;
  });
  return sorted;
}

      <div class="td-a">
        <button class="bic" onclick="openIM('${i.id}')"><i class="ti ti-edit"></i></button>
        <button class="bic d" onclick="delI('${i.id}')"><i class="ti ti-trash"></i></button>
      </div>

}

function inventoryHTML(q){
  const allBase=S.inventory.filter(i=>!q||[i.name,i.category,i.description,i.plannedUsage]
    .concat(Object.values(i)).some(v=>v&&String(v).toLowerCase().includes(q)));
  const allItems=invCatFilter==='All'?allBase:allBase.filter(i=>i.category===invCatFilter);
  const lowCount=(S.inventory||[]).filter(i=>i.isLowStock).length;
  const list=invSortedList(allItems);

  // Category counts
  const catCounts={'All':allBase.length};
  IC.forEach(c=>{catCounts[c]=allBase.filter(i=>i.category===c).length;});
  const activeCats=['All',...IC.filter(c=>(catCounts[c]||0)>0)];

  // Filter bar — inline active styles so every category works
  const filterBar=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center">
    ${activeCats.map(c=>{
      const on=invCatFilter===c;
      return`<button onclick="setInvCat('${c}')" style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;font-size:11px;font-weight:${on?600:400};border-radius:99px;cursor:pointer;border:1px solid ${on?'rgba(226,35,26,.4)':'var(--border2)'};background:${on?'var(--accent-bg)':'transparent'};color:${on?'var(--accent)':'var(--text2)'};font-family:var(--font);transition:all .12s">
        ${c}<span style="font-size:12px;background:${on?'rgba(226,35,26,.15)':'rgba(128,128,128,.15)'};padding:1px 6px;border-radius:99px;margin-left:2px">${catCounts[c]||0}</span>
      </button>`;
    }).join('')}
  </div>`;

  // Determine columns for this view
  const cols=CAT_COLS[invCatFilter]||null;
  const noSort='padding:9px 14px;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg2)';
  const canSort='padding:9px 14px;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg2);cursor:pointer;user-select:none;white-space:nowrap';
  const th=(k,l)=>{
    const active=invSort.col===k;
    const arrow=active?(invSort.dir==='asc'?'↑':'↓'):'<span style="opacity:.3">↕</span>';
    return`<th style="${canSort}${active?';color:var(--accent)':''}" onclick="sortInv('${k}')" title="Sort by ${l}">${l} ${arrow}</th>`;
  };

  // Cell renderer for category-specific value
  const cellVal=(item,key)=>{
    const v=item[key];
    if(key==='name')return`<div style="font-weight:500;display:flex;align-items:center;gap:6px">${item.isLowStock?'<span style="width:7px;height:7px;border-radius:50%;background:var(--danger);flex-shrink:0" title="Low stock"></span>':''}${esc(item.name||'—')}</div>${item.plannedUsage?`<div style="font-size:12px;color:var(--accent);margin-top:2px"><i class="ti ti-bookmark"></i> ${esc(item.plannedUsage)}</div>`:''}`;
    if(key==='qty')return`<span class="mono"${item.isLowStock?' style="color:var(--danger);font-weight:500"':''}>${v||0}</span>`;
    if(key==='driveHealth')return healthBadge(v,item.driveHealthConfirmed);
    return`<span style="font-size:11px">${esc(String(v||'—'))}</span>`;
  };

  // Row renderer
  const renderRow=(item,indent)=>{
    const lo=item.isLowStock;
    const rowStyle=lo?'background:rgba(239,68,68,0.04)':'';
    const pad=indent?'28px':'14px';
    if(cols){
      return`<tr${lo?` style="${rowStyle}"`:''}>
        ${cols.map((c,ci)=>`<td style="padding:10px 12px 10px ${ci===0?pad:'12px'};vertical-align:middle">${cellVal(item,c.k)}</td>`).join('')}
        <td style="padding:9px 12px"><div class="td-a">
          <button class="bic" onclick="openIM('${item.id}')"><i class="ti ti-edit"></i></button>
          <button class="bic d" onclick="delI('${item.id}')"><i class="ti ti-trash"></i></button>
        </div></td></tr>`;
    }
    const spec=getCatSpec(item.category);
    const specText=spec.display?spec.display(item):'';
    return`<tr${lo?` style="${rowStyle}"`:''}>
      <td style="padding:10px 14px;vertical-align:middle">${cellVal(item,'name')}</td>
      <td style="padding:9px 12px;color:var(--text2);font-size:11px;vertical-align:middle">${item.category}</td>
      <td style="padding:9px 12px;cursor:pointer;vertical-align:middle" onclick="sortInv('qty')">${cellVal(item,'qty')}</td>
      <td style="padding:9px 12px;font-size:11px;max-width:240px;vertical-align:middle">${specText}</td>
      <td style="padding:9px 12px;vertical-align:middle"><div class="td-a">
        <button class="bic" onclick="openIM('${item.id}')" title="Edit"><i class="ti ti-edit"></i></button>
        <button class="bic" onclick="cycleShipping('${item.id}')" title="${item.shippingStatus||'Not set'} — click to cycle" style="color:${item.shippingStatus==='Incoming'?'var(--info)':item.shippingStatus==='In Stock'?'var(--success)':item.shippingStatus==='Shipped Out'?'#c084fc':'var(--text3)'}" style="color:${item.shippingStatus==='Incoming'?'var(--info)':item.shippingStatus==='In Stock'?'var(--success)':item.shippingStatus==='Shipped Out'?'#c084fc':'var(--text3)'}"><i class="ti ${item.shippingStatus==='Incoming'?'ti-truck-delivery':item.shippingStatus==='In Stock'?'ti-package-check':item.shippingStatus==='Shipped Out'?'ti-truck':'ti-package'}"></i></button>
        <button class="bic" onclick="moveToForSale('${item.id}')" title="Move to For Sale" style="color:var(--success)"><i class="ti ti-arrow-right"></i></button>
        <button class="bic d" onclick="delI('${item.id}')" title="Trash"><i class="ti ti-trash"></i></button>
      </div></td></tr>`;
  };

  // SSD grouping (All view or SSD filter)
  const showSSDGroups=invCatFilter==='All'||invCatFilter==='SSD/HDD';
  const ssdItems=showSSDGroups?list.filter(i=>i.category==='SSD/HDD'):[];
  const nonSSD=showSSDGroups?list.filter(i=>i.category!=='SSD/HDD'):list;
  const ssdGroups={};
  ssdItems.forEach(i=>{const k=(i.name||'').toLowerCase().trim();(ssdGroups[k]=ssdGroups[k]||[]).push(i);});
  const ssdGroupKeys=Object.keys(ssdGroups);
  const colSpan=(cols?cols.length:4)+1;

  const renderGroup=(items)=>{
    if(items.length===1)return renderRow(items[0],'');
    const name=esc(items[0].name)||'—';
    const total=items.reduce((s,i)=>s+Number(i.qty||0),0);
    const groupKey=(items[0].name||'').toLowerCase().trim();
    const esc_key=groupKey.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const folded=collapsedSSDGroups.has(groupKey);
    const healthPills=items.map(i=>healthBadge(i.driveHealth,i.driveHealthConfirmed)).join(' ');
    const header=`<tr style="background:var(--bg3);cursor:pointer" onclick="toggleSSDGroup('${esc_key}')" title="${folded?'Click to expand':'Click to collapse'}">
      <td colspan="${colSpan+1}" style="padding:9px 14px;font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:var(--text2)">${folded?'▶':'▼'}</span>
        <i class="ti ti-stack-2" style="color:var(--text2)"></i>
        <span>${name}</span>
        <span style="color:var(--text2);font-weight:400;font-size:12px">${items.length} units</span>
        ${folded?healthPills:''}
      </td>
    </tr>`;
    if(folded)return header;
    return header+items.map(i=>renderRow(i,'  ')).join('');
  };

  // Table header
  const thead=cols
    ?`<tr>${cols.map(c=>th(c.k,c.l)).join('')}<th style="${noSort}"></th></tr>`
    :`<tr>${th('name','Name')}${th('category','Category')}${th('qty','Qty')}<th style="${noSort}">Specs</th><th style="${noSort}"></th></tr>`;

  const rows=[
    ...nonSSD.map(i=>renderRow(i,'')),
    ...(ssdGroupKeys.length&&invCatFilter==='All'
      ?[`<tr><td colspan="${colSpan+1}" style="padding:5px 14px;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border)">SSD / HDD</td></tr>`]
      :[]),
    ...ssdGroupKeys.map(k=>renderGroup(ssdGroups[k])),
  ].join('');

  const hint=invCatFilter==='All'&&list.length>0
    ?`<p style="font-size:11px;color:var(--text3);margin-bottom:10px"><i class="ti ti-info-circle" style="margin-right:4px"></i>Select a category above to see and sort by detailed specs (RAM size/speed, SSD health, CPU cores, etc.)</p>`:'';

  return`<div class="tb"><h2>Parts &amp; Inventory</h2>
    <div class="tb-r">
      ${lowCount>0?`<span class="bdg b-urgent"><i class="ti ti-alert-circle" style="margin-right:3px"></i>${lowCount} low</span>`:''}
      <button class="btn btn-g" onclick="exportCSV()"><i class="ti ti-download"></i>CSV</button>
      <button class="btn btn-p" onclick="openIM(null)"><i class="ti ti-plus"></i>Add Part</button>
    </div></div>
  ${filterBar}
  ${hint}
  ${list.length===0?`<div class="empty"><i class="ti ti-package"></i><p>${q?'No results.':invCatFilter!=='All'?'No '+invCatFilter+' parts yet.':'No parts yet.'}</p></div>`:`
  <div class="tw"><table>
    <thead>${thead}</thead>
    <tbody>${rows}</tbody>
  </table></div>`}`;
}

function saveR(id,created,isNew){
  const r={id,customerId:gv('f-cid')||null,customer:gv('f-cn'),phone:gv('f-ph'),email:gv('f-em'),
    deviceType:gv('f-dt'),brand:gv('f-br'),model:gv('f-mo'),serial:gv('f-sn'),
    ...getLF(),
    issue:gv('f-issue'),priority:gv('f-pr'),status:gv('f-st'),
    technician:gv('f-tech'),notes:gv('f-notes'),partsNeeded:gv('f-parts'),eta:gv('f-eta'),
    contactPlatform:gv('f-plat'),contactUrl:gv('f-curl'),
    sourceUrl:gv('f-sourceUrl')||'',
    created:isNew?today():created};
  // carry over timeline + photos from existing or initialize
  const existing=S.repairs.find(x=>x.id===id);
  r.timeline=existing?existing.timeline||[]:(isNew?[{text:'Repair created',ts:new Date().toISOString()}]:[]);
  r.photos=[...(_pendingPhotos||[])];
  r.partsUsed=[...(_partsUsed||[])];
  // deduct parts used from inventory
  if(!isNew&&existing){
    const usedBefore=new Set((existing.partsUsed||[]).map(p=>p.itemId));
    r.partsUsed.filter(p=>!usedBefore.has(p.itemId)).forEach(p=>{
      const inv=S.inventory.find(x=>x.id===p.itemId);
      if(inv)inv.qty=Math.max(0,Number(inv.qty||0)-Number(p.qty||1));
    });
  } else if(isNew){
    r.partsUsed.forEach(p=>{
      const inv=S.inventory.find(x=>x.id===p.itemId);
      if(inv)inv.qty=Math.max(0,Number(inv.qty||0)-Number(p.qty||1));
    });
  }
  r.updatedAt=new Date().toISOString();
  if(isNew)S.repairs.push(r); else S.repairs=S.repairs.map(x=>x.id===id?r:x);
  logActivity(isNew?`New repair: ${r.customer||'Unknown'} — ${[r.brand,r.model].filter(Boolean).join(' ')||r.deviceType}`:`Updated: ${r.customer||'Repair'}`,'repair');
  _pendingPhotos=[];_partsUsed=[];
  save();closeM();render();
}

let TII=[],TID=null,TINEW=false;

function openInvM(id){
  if(id){
    const inv=S.invoices.find(x=>x.id===id);

  openM(`<div class="mh"><div class="mt">${inv?'Edit Invoice':'New Invoice'}</div><button class="bic" onclick="safeCloseM()"><i class="ti ti-x"></i></button></div>

function renderII(){
  const el=document.getElementById('inv-items-wrap');if(!el)return;
  const total=TII.reduce((s,i)=>s+Number(i.qty||0)*Number(i.price||0),0);
  el.innerHTML=`<table class="inv-items">
    <thead><tr><th style="width:48%">Description</th><th style="width:12%">Qty</th><th style="width:18%">Unit Ft</th><th style="width:15%">Total</th><th style="width:7%"></th></tr></thead>
    <tbody>${TII.map((item,i)=>`<tr>
      <td><input class="ii" value="${esc(item.desc||'')}" placeholder="Labour / part…" oninput="updII(${i},'desc',this.value)"></td>
      <td><input class="ii" type="number" min="1" value="${item.qty||1}" oninput="updII(${i},'qty',this.value)" style="width:50px"></td>
      <td><input class="ii" type="number" step="0.01" value="${item.price||''}" placeholder="0.00" oninput="updII(${i},'price',this.value)" style="width:70px"></td>
      <td class="mono" style="font-size:11px">${fmt(Number(item.qty||0)*Number(item.price||0))}</td>
      <td><button class="bic" onclick="removeII(${i})" style="padding:2px 5px;font-size:11px"><i class="ti ti-x"></i></button></td>
    </tr>`).join('')}</tbody>
  </table>
  <div class="inv-tot">Total: <span class="acc">${fmt(total)}</span></div>`;
}

function updII(i,f,v){TII[i][f]=v;renderII()}
function addII(){TII.push({desc:'',qty:1,price:''});renderII()}
function removeII(i){TII.splice(i,1);renderII()}

function autofillInv(cid){
  if(!cid)return;
  const c=S.customers.find(x=>x.id===cid);if(!c)return;
  const n=document.getElementById('f-cn'),e=document.getElementById('f-em');
  if(n)n.value=c.name;if(e)e.value=c.email||'';
}

function autofillInvRepair(rid){
  if(!rid)return;
  const r=S.repairs.find(x=>x.id===rid);if(!r)return;
  const n=document.getElementById('f-cn'),e=document.getElementById('f-em');
  if(n&&!n.value)n.value=r.customer||'';
  if(e&&!e.value)e.value=r.email||'';
  if(!TII.some(i=>i.desc.includes('Repair'))){
    TII.push({desc:`Repair: ${[r.brand,r.model].filter(Boolean).join(' ')}${r.issue?' — '+r.issue.slice(0,40):''}`,qty:1,price:''});
    renderII();
  }
}

function saveInv(){
  const inv={id:TID,customerId:gv('f-cid')||null,customerName:gv('f-cn'),
    customerEmail:gv('f-em'),repairId:gv('f-rid')||null,
    items:TII.map(i=>({...i})),notes:gv('f-notes'),
    status:gv('f-ist'),due:gv('f-due'),
    invoiceNum:TINEW?nextInvNum():(S.invoices.find(x=>x.id===TID)||{invoiceNum:'—'}).invoiceNum,
    created:TINEW?today():(S.invoices.find(x=>x.id===TID)||{created:today()}).created};
  if(TINEW)S.invoices.push(inv); else S.invoices=S.invoices.map(x=>x.id===TID?inv:x);
  save();closeM();render();
}

// TRASH
// ══════════════════════════════════════════════
function purgeOld(){
  const now=Date.now();
  S.trash=(S.trash||[]).filter(t=>now-new Date(t.deletedAt).getTime()<30*86400000);
}
function daysLeft(d){return Math.max(0,30-Math.floor((Date.now()-new Date(d).getTime())/86400000))}
function itemLabel(t){
  const d=t.data;
  if(t.type==='repair')    return (d.customer||'Unknown')+' — '+(([d.brand,d.model].filter(Boolean).join(' '))||'Unknown device');
  if(t.type==='forsale')   return ([d.brand,d.model].filter(Boolean).join(' '))||'Unknown device';
  if(t.type==='inventory') return d.name||'Unknown part';
  if(t.type==='customer')  return d.name||'Unknown customer';
  if(t.type==='invoice')   return (d.invoiceNum||'—')+' — '+(d.customerName||'Unknown');
  if(t.type==='note')      return (d.text||'').slice(0,50)||'Empty note';
  return '—';
}
const TYPE_ICON={repair:'ti-tool',forsale:'ti-tag',inventory:'ti-package',customer:'ti-user',invoice:'ti-receipt',note:'ti-notes'};
const TYPE_LABEL={repair:'Repair',forsale:'For Sale',inventory:'Part',customer:'Customer',invoice:'Invoice',note:'Note'};
const RESTORE_KEY={repair:'repairs',forsale:'forSale',inventory:'inventory',customer:'customers',invoice:'invoices',note:'notes'};

function restoreItem(trashId){
  const t=(S.trash||[]).find(x=>x.id===trashId);if(!t)return;
  const key=RESTORE_KEY[t.type];
  if(key)S[key].push(t.data);
  S.trash=S.trash.filter(x=>x.id!==trashId);
  save();render();
}
function purgeItem(trashId){
  if(!confirm('Permanently delete? Cannot be undone.'))return;
  S.trash=S.trash.filter(x=>x.id!==trashId);
  save();render();
}
function purgeAll(){
  if(!confirm('Empty entire trash? All items will be permanently deleted.'))return;
  S.trash=[];save();render();
}

function trashHTML(q){
  purgeOld();
  const all=(S.trash||[]).sort((a,b)=>new Date(b.deletedAt)-new Date(a.deletedAt));
  const list=q?all.filter(t=>itemLabel(t).toLowerCase().includes(q)):all;
  return`<div class="tb">
    <h2>Trash <span class="t2">(${list.length})</span> <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:6px">Items auto-delete after 30 days</span></h2>
    ${list.length>0?`<button class="btn btn-g" onclick="purgeAll()" style="color:var(--danger);border-color:rgba(239,68,68,.3)"><i class="ti ti-trash"></i>Empty Trash</button>`:''}
  </div>
  ${list.length===0?`<div class="empty"><i class="ti ti-trash-x"></i><p>Trash is empty.</p></div>`:`
  <div class="tw"><table>
    <thead><tr><th>Type</th><th>Item</th><th>Deleted</th><th>Expires in</th><th></th></tr></thead>
    <tbody>${list.map(t=>{
      const dl=daysLeft(t.deletedAt);
      const dpill=dl>7?'days-ok':dl>2?'days-warn':'days-crit';
      return`<tr>
        <td><span class="bdg b-low"><i class="ti ${TYPE_ICON[t.type]||'ti-file'}" style="margin-right:4px"></i>${TYPE_LABEL[t.type]||t.type}</span></td>
        <td class="td-m" style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(itemLabel(t))}</td>
        <td class="mono t2" style="font-size:12px">${t.deletedAt.slice(0,10)}</td>
        <td><span class="days-pill ${dpill}">${dl}d</span></td>
        <td><div class="td-a">
          <button class="bic" onclick="restoreItem('${t.id}')" title="Restore"><i class="ti ti-arrow-back-up"></i></button>
          <button class="bic d" onclick="purgeItem('${t.id}')" title="Delete permanently"><i class="ti ti-trash"></i></button>
        </div></td></tr>`;
    }).join('')}
    </tbody></table></div>`}`;
}

      if(obj.ramGB)lines.push('RAM           : '+obj.ramGB+' GB');

      if(obj.hasFingerprint)lines.push('Fingerprint   : Yes');

function importData(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=evt=>{
      try{
        const p=JSON.parse(evt.target.result);
        if(typeof p!=='object'||p===null||Array.isArray(p))throw new Error('Invalid file format');
        // Accept both raw S dump and the new _meta-wrapped format
        const src=p._meta?p:p;
        const listKeys=['repairs','forSale','inventory','customers','invoices','notes','trash','activity'];
        const safe={
          tab:'dashboard',search:'',
          invC:Number(src.invC)||1,
          shippingStatus:src.shippingStatus||''
        };
        for(const k of listKeys){
          safe[k]=Array.isArray(src[k])
            ?src[k].filter(x=>x&&typeof x==='object'&&!Array.isArray(x))
            :[];
        }
        // Build a summary before confirming
        const summary=[
          safe.repairs.length+' repairs',
          safe.customers.length+' customers',
          safe.forSale.length+' for-sale listings',
          safe.inventory.length+' inventory items',
          safe.invoices.length+' invoices',
          safe.notes.length+' notes',
          safe.trash.length+' trash items',
          safe.activity.length+' activity entries',
        ].join('\n');
        if(!confirm('This will REPLACE all current data with:\n\n'+summary+'\n\nContinue?'))return;
        // Fix invoice counter: never go backward
        safe.invC=Math.max(Number(S.invC)||1, Number(safe.invC)||1);
        const tempS=Object.assign({},S,safe);
        Object.assign(S,tempS);
        save();render();
        alert('Import successful!\n\n'+summary);
      }catch(err){alert('Import failed: '+err.message+'\n\nMake sure this is a valid Workbench CRM backup file.');}
    };
    reader.readAsText(file);
  };
  inp.click();
}

function hashPin(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return h.toString(36);}
function initPin(){
  const stored=localStorage.getItem('wb_pin');
  if(!stored)return; // no PIN set
  document.getElementById('pin-overlay').style.display='flex';
  document.getElementById('pin-entry').focus();
}
function checkPin(val){
  if(val.length<4)return;
  const stored=localStorage.getItem('wb_pin');
  if(!stored)return;
  if(hashPin(val)===stored){
    document.getElementById('pin-overlay').style.display='none';
    document.getElementById('pin-err').textContent='';
  } else if(val.length>=8||val.length>=4){
    document.getElementById('pin-err').textContent='Incorrect PIN';
    setTimeout(()=>{
      document.getElementById('pin-entry').value='';
      document.getElementById('pin-err').textContent='';
    },1000);
  }
}

  </div>
  <div class="mf">
    ${cur?'<button class="btn btn-g" style="color:var(--danger)" onclick="localStorage.removeItem(\'wb_pin\');closeM();alert(\'PIN removed.\')">Remove PIN</button>':''}
    <button class="btn btn-g" onclick="closeM()">Cancel</button>
    <button class="btn btn-p" onclick="savePin()">Save PIN</button>
  </div>`);
}
function savePin(){
  const p1=document.getElementById('f-pin1').value;
  const p2=document.getElementById('f-pin2').value;
  if(!p1){localStorage.removeItem('wb_pin');closeM();alert('PIN removed.');return;}
  if(p1.length<4){alert('PIN must be at least 4 characters.');return;}
  if(p1!==p2){alert('PINs do not match.');return;}
  localStorage.setItem('wb_pin',hashPin(p1));
  closeM();alert('PIN saved. You will be prompted on next load.');
}

];
let CURRENCY=CURRENCIES[0]; // default: EUR
function loadCurrency(){
  try{
    const saved=localStorage.getItem('wb_currency');
    if(saved){const c=CURRENCIES.find(x=>x.code===saved);if(c)CURRENCY=c;}
  }catch(e){}
}
function saveCurrency(code){
  const c=CURRENCIES.find(x=>x.code===code);
  if(!c)return;
  CURRENCY=c;
  try{localStorage.setItem('wb_currency',code);}catch(e){}
  // Update currency display in header
  const el=document.getElementById('currency-display');
  if(el)el.textContent=CURRENCY.symbol;
  render();
}

const ACT_ICON={repair:'ti-tool',sale:'ti-tag',inventory:'ti-package',customer:'ti-user',invoice:'ti-receipt',note:'ti-notes',status:'ti-refresh'};
const ACT_COLOR={repair:'var(--accent-bg)',sale:'var(--success-bg)',inventory:'var(--info-bg)',customer:'var(--warn-bg)',invoice:'var(--success-bg)',note:'var(--bg3)',status:'var(--info-bg)'};
function viewAllActivity(){
  const rows=(S.activity||[]).map(a=>`<div class="act-row">
    <div class="act-ic" style="background:${ACT_COLOR[a.type]||'var(--bg3)'}"><i class="ti ${ACT_ICON[a.type]||'ti-info'}" style="font-size:12px;color:var(--text2)"></i></div>
    <div class="act-body"><div class="act-text">${esc(a.text||'')}</div>
    <div class="act-ts">${a.ts?new Date(a.ts).toLocaleString('hu-HU'):'—'}</div></div></div>`).join('')
    ||'<p style="color:var(--text3)">No activity yet</p>';
  openM(`<div class="mh"><div class="mt">Activity Log</div><button class="bic" onclick="safeCloseM()"><i class="ti ti-x"></i></button></div>
  <div style="max-height:65vh;overflow-y:auto">
    <div class="act-list">${rows}</div>
  </div>
  <div class="mf"><button class="btn btn-p" onclick="S.activity=[];save();closeM();render()"><i class="ti ti-trash"></i>Clear Log</button></div>`);
}
function logActivity(text, type='repair'){
  S.activity=S.activity||[];
  S.activity.unshift({text,type,ts:new Date().toISOString()});
  if(S.activity.length>50)S.activity=S.activity.slice(0,50);
}
function relTime(iso){
  const d=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(d<60)return d+'s ago';if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';
}

function reportsHTML(){
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
    months.push(d.toISOString().slice(0,7));
  }
  const mLabel=m=>{const[y,mo]=m.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]+' '+y.slice(2);};
  const rDone=m=>S.repairs.filter(r=>r.status==='Done'&&(r.created||'').startsWith(m)).length;
  const rAll=m=>S.repairs.filter(r=>(r.created||'').startsWith(m)).length;
  const inv=m=>S.invoices.filter(i=>i.status==='Paid'&&(i.created||'').startsWith(m)).reduce((s,i)=>s+invTot(i),0);
  const maxDone=Math.max(1,...months.map(rDone));
  const maxInv=Math.max(1,...months.map(inv));
  
  const devTypes={};
  S.repairs.forEach(r=>{const k=r.deviceType||'Other';devTypes[k]=(devTypes[k]||0)+1;});
  const topDevices=Object.entries(devTypes).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxDev=Math.max(1,...topDevices.map(([,n])=>n));

  const catBreak={};
  S.inventory.forEach(i=>{const k=i.category||'Other';catBreak[k]=(catBreak[k]||0)+Number(i.qty||0);});
  const topCats=Object.entries(catBreak).sort((a,b)=>b[1]-a[1]).slice(0,6);
  
  const avgEta=()=>{
    const done=S.repairs.filter(r=>r.status==='Done'&&r.created&&r.eta);
    if(!done.length)return'—';
    const avg=done.reduce((s,r)=>{
      const d=Math.ceil((new Date(r.eta)-new Date(r.created))/86400000);
      return s+(d>0?d:0);
    },0)/done.length;
    return Math.round(avg)+' days';
  };
  
  const now=today().slice(0,7);
  return`
    <div style="margin-bottom:16px"><h2 style="font-size:12px;font-weight:500">Reports</h2></div>
    <div class="stats" style="margin-bottom:16px">
      ${[
        ['Total Repairs',S.repairs.length,'ti-tool'],
        ['Completed',S.repairs.filter(r=>r.status==='Done').length,'ti-check'],
        ['Avg ETA',avgEta(),'ti-clock'],
        ['Invoiced',fmt(S.invoices.filter(i=>i.status==='Paid').reduce((s,i)=>s+invTot(i),0)),'ti-receipt'],
        ['Listings',S.forSale.length,'ti-tag'],
        ['Parts in Stock',S.inventory.reduce((s,i)=>s+Number(i.qty||0),0),'ti-package'],
      ].map(([l,v,ic])=>`<div class="sc"><div class="sc-label"><i class="ti ${ic}"></i>${l}</div><div class="sc-val">${v}</div></div>`).join('')}
    </div>

      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="dash-card">
          <h3><i class="ti ti-tool"></i>Repairs Completed — Last 6 Months</h3>
          ${months.map(m=>`<div class="rbar-row">
            <div class="rbar-lbl">${mLabel(m)}</div>
            <div class="rbar-track"><div class="rbar-fill" style="width:${Math.round(rDone(m)/maxDone*100)}%"></div></div>
            <div class="rbar-val">${rDone(m)}<span style="color:var(--text3);font-size:11px"> /${rAll(m)}</span></div>
          </div>`).join('')}
        </div>
        <div class="dash-card">
          <h3><i class="ti ti-receipt"></i>Paid Invoice Revenue — Last 6 Months</h3>
          ${months.map(m=>`<div class="rbar-row">
            <div class="rbar-lbl">${mLabel(m)}</div>
            <div class="rbar-track"><div class="rbar-fill" style="width:${Math.round(inv(m)/maxInv*100)}%;background:var(--success)"></div></div>
            <div class="rbar-val" style="font-size:11px">${fmt(inv(m))}</div>
          </div>`).join('')}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="dash-card">
          <h3><i class="ti ti-device-laptop"></i>Repairs by Device Type</h3>
          ${topDevices.map(([k,n])=>`<div class="rbar-row">
            <div class="rbar-lbl">${k}</div>
            <div class="rbar-track"><div class="rbar-fill" style="width:${Math.round(n/maxDev*100)}%;background:var(--info)"></div></div>
            <div class="rbar-val">${n}</div>
          </div>`).join('')||'<p style="font-size:11px;color:var(--text3)">No data yet</p>'}
        </div>
        <div class="dash-card">
          <h3><i class="ti ti-package"></i>Inventory by Category</h3>

            return sorted.map(([k,n])=>`<div class="rbar-row"><div class="rbar-lbl">${k}</div>
              <div class="rbar-track"><div class="rbar-fill" style="width:${Math.round(n/mx*100)}%;background:var(--success)"></div></div>
              <div class="rbar-val" style="font-size:10px">${fmt(n)}</div></div>`).join('');})()}
        </div>
      </div>
    </div>
    </div>`;
}

function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);}}
const _onSearchDebounced=debounce(v=>{
  S.search=v;
  if(v.length>=2){showGlobalSearch(v);}else{closeGlobalSearch();if(S.tab!=='dashboard'&&S.tab!=='reports')renderPage();}

function showGlobalSearch(q){
  const ql=q.toLowerCase();
  let el=document.getElementById('gso');

  const groups=[];
  const rr=S.repairs.filter(r=>[r.customer,r.brand,r.model,r.issue,r.status].some(v=>(v||'').toLowerCase().includes(ql))).slice(0,5);
  if(rr.length)groups.push({label:'Repairs',items:rr.map(r=>({title:esc(r.customer||'Unknown'),sub:esc([r.brand,r.model].join(' '))+' — '+bdg(r.status),onclick:`closeGlobalSearch();switchTab('repairs');setTimeout(()=>viewR('${r.id}'),100)`}))});
  const ss=S.forSale.filter(s=>[s.brand,s.model,s.condition,s.status].some(v=>(v||'').toLowerCase().includes(ql))).slice(0,4);
  if(ss.length)groups.push({label:'For Sale',items:ss.map(s=>({title:esc([s.brand,s.model].join(' ')||'—'),sub:bdg(s.status),onclick:`closeGlobalSearch();switchTab('forsale')`}))});
  const cc=S.customers.filter(c=>[c.name,c.phone,c.email].some(v=>(v||'').toLowerCase().includes(ql))).slice(0,4);
  if(cc.length)groups.push({label:'Customers',items:cc.map(c=>({title:esc(c.name),sub:esc(c.phone||c.email||''),onclick:`closeGlobalSearch();switchTab('customers');setTimeout(()=>viewC('${c.id}'),100)`}))});
  const ii=S.inventory.filter(i=>[i.name,i.category].some(v=>(v||'').toLowerCase().includes(ql))).slice(0,4);
  if(ii.length)groups.push({label:'Inventory',items:ii.map(i=>({title:esc(i.name),sub:i.category+' · qty '+i.qty,onclick:`closeGlobalSearch();switchTab('inventory')`}))});
  if(!groups.length){el.innerHTML='<p style="color:var(--text3);font-size:11px">No results for "'+esc(q)+'"</p>';el.classList.add('open');return;}
  el.innerHTML=groups.map(g=>`<div class="gso-group">
    <div class="gso-label">${g.label}</div>
    ${g.items.map(i=>`<div class="gso-item" onclick="${i.onclick}"><div><div class="gso-title">${i.title}</div><div class="gso-sub">${i.sub}</div></div></div>`).join('')}
  </div>`).join('');
  el.classList.add('open');
}

}

let _pendingPhotos=[];
function addPhotosFromInput(inputEl){
  const files=Array.from(inputEl.files);
  const promises=files.slice(0,6-_pendingPhotos.length).map(f=>new Promise(r=>{
    if(f.size>3*1024*1024){alert('Max 3MB per photo');r(null);return;}
    const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(f);
  }));
  Promise.all(promises).then(async results=>{
    const compressed=await Promise.all(results.filter(Boolean).map(compressPhoto));
    _pendingPhotos=[..._pendingPhotos,...compressed.filter(Boolean)];
    renderPendingPhotos();
  });
}
async function compressPhoto(dataUrl,maxPx=1200,q=0.75){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxPx/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*ratio);c.height=Math.round(img.height*ratio);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',q));
    };
    img.onerror=()=>res(dataUrl);
    img.src=dataUrl;
  });
}
function renderPendingPhotos(){
  const el=document.getElementById('pending-photos');if(!el)return;
  el.innerHTML=_pendingPhotos.map((p,i)=>`<div class="ph-wrap">
    <img src="${p}" alt="photo" onclick="openLightbox('${p}')">
    <button class="ph-del" onclick="_pendingPhotos.splice(${i},1);renderPendingPhotos()">×</button>
  </div>`).join('')+
  (_pendingPhotos.length<6?`<label class="ph-add" style="cursor:pointer"><i class="ti ti-camera-plus"></i><input type="file" accept="image/*" multiple style="display:none" onchange="addPhotosFromInput(this)"></label>`:'');
}

  return`<div class="fs"><div class="fsl">Photos (max 6)</div>
    <div class="photo-grid" id="pending-photos"></div>

}
function openLightbox(src){const lb=document.getElementById('lightbox');document.getElementById('lb-img').src=src;lb.classList.add('open');}

function doMerge(baseId){
  const mergeId=gv('f-merge-target');if(!mergeId)return alert('Select a customer first');

  S.repairs=S.repairs.map(r=>r.customerId===mergeId?{...r,customerId:baseId}:r);
  S.invoices=S.invoices.map(i=>i.customerId===mergeId?{...i,customerId:baseId}:i);

  logActivity(`Merged customer into ${S.customers.find(x=>x.id===baseId)?.name||'customer'}`,'customer');

    repasted:sale.repasted||false,
    pasteUsed:sale.pasteUsed||'',
    pasteDate:sale.pasteDate||'',
    driveType:sale.driveType||'',
    m2size:sale.m2size||'',
    driveHealth:sale.ssdHealth||'',
    driveHealthConfirmed:false,
    // Fields used by inventory Laptop category form
    devModel:[sale.brand,sale.model].filter(Boolean).join(' '),
    devCPU:sale.cpuModel||'',
    devRAM:sale.ramGB||'',
    devStorage:sale.storageGB||'',
    devBatt:sale.batteryHealth||'',
    devCond:sale.condition||'',
    devScreen:sale.screenCond||'',
    // Fields used by inventory RAM category form
    ramSize:sale.ramGB||'',
    ramType:sale.ramType||'',
    ramSpeed:sale.ramSpeed||'',
    ramMaker:sale.ramMaker||'',
    ramForm:sale.ramForm||'',
    // Fields used by inventory SSD/HDD category form
    driveSize:sale.storageGB||'',
    // Fields used by Desktop PC
    dCPU:sale.cpuModel||'',
    dRAM:sale.ramGB||'',
    dStorage:sale.storageGB||'',
    dGPU:sale.gpuModel||'',
  };
  S.inventory.push(item);
  if(document.getElementById('mv-rm')?.checked){
    toTrash('forsale',sale);S.forSale=S.forSale.filter(x=>x.id!==saleId);
  }
  logActivity(`Moved "${item.name}" to Inventory`,'inventory');
  save();closeM();render();
}
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
loadCurrency();load();purgeOld();loadTheme();render();initPin();
</script>
